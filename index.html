<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>
    <body>
        <div class="menu">
            <button class="refresh-scoreboard" onclick=reset_score()><i class="fa fa-refresh"></i></button>
        </div>
        <div class="scoreboard">
            <div class="home">
                <h3>HOME</h3>
                <div class="home-score">
                    <h1 class="score" id="home-total-score">0</h1>
                </div>
                <div class="incrementers">
                    <div class="plus-score">
                        <button class="plus-score" id="plus-one-home" onclick=add_one("home")>+1</button>
                        <button class="plus-score" id="plus-two-home" onclick=add_two("home")>+2</button>
                        <button class="plus-score" id="plus-three-home" onclick=add_three("home")>+3</button>
                    </div>
                </div>
            </div>
            <div class="guest">
                <h3>GUEST</h3>
                <div class="guest-score">
                    <h1 class="score" id="guest-total-score">0</h1>
                </div>
                <div class="incrementers">
                    <div class="plus-score">
                        <button class="plus-score" id="plus-one-guest" onclick=add_one("guest")>+1</button>
                        <button class="plus-score" id="plus-two-guest" onclick=add_two("guest")>+2</button>
                        <button class="plus-score" id="plus-three-guest" onclick=add_three("guest")>+3</button>
                    </div>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
